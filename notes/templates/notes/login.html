{% extends "notes/base.html" %}

{% block title %}Вхід{% endblock %}

{% block content %}

<div class="row justify-content-center">
    <div class="col-md-5">
        <h1 class="mb-4">Вхід</h1>

        {% if form.errors %}
        <div class="alert alert-danger">Невірне ім'я користувача або пароль.</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}

            <div class="mb-3">
                <label for="id_username" class="form-label">Ім'я користувача</label>
                <input type="text" name="username" class="form-control" id="id_username" required autofocus>
            </div>

            <div class="mb-3">
                <label for="id_password" class="form-label">Пароль</label>
                <input type="password" name="password" class="form-control" id="id_password" required>
            </div>

            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="btn btn-primary">Увійти</button>
        </form>
    </div>
</div>

{% endblock %}
