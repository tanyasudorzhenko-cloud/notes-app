{% extends "notes/base.html" %}

{% block title %}Видалити нотатку{% endblock %}

{% block content %}

    <header class="hero">
        <p class="hero__eyebrow">Notes App</p>
        <h1 class="hero__title">Видалити нотатку?</h1>
        <p class="hero__subtitle">Цю дію не можна буде скасувати.</p>
    </header>

    <div class="form-card">
        <p><strong>{{ note.title }}</strong></p>
        <p>{{ note.text }}</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-actions">
                <button type="submit" class="btn btn--danger">Так, видалити</button>
                <a href="{% url 'note_detail' note.pk %}" class="btn btn--ghost">Скасувати</a>
            </div>
        </form>
    </div>

{% endblock %}
